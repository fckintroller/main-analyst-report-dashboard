<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대한민국 최정상급 베스트 애널리스트 대시보드</title>
  <!-- Google Fonts & Font Awesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --bg-color: #040608;
      --card-bg: #080c12;
      --card-border: #101620;
      --text-main: #d1d5db;
      --text-sub: #6b7280;
      --primary: #047857;
      --primary-glow: rgba(4, 120, 87, 0.1);
      --accent: #047857;
      --upgrade: #059669;
      --downgrade: #b91c1c;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; line-height: 1.6; }
    .container { max-width: 1300px; margin: 0 auto; padding: 40px 20px; }
    .tabs-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; border-bottom: 1px solid #101620; padding-bottom: 20px; }
    .tab-btn { background: #080c12; border: 1px solid var(--card-border); color: var(--text-sub); padding: 12px 25px; font-weight: 600; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: var(--transition); }
    .tab-btn.active { color: #10b981; background: rgba(4, 120, 87, 0.12); border-color: var(--primary); }
    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* 애널리스트 카드 */
    .filter-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }
    .filter-btn { background: #080c12; border: 1px solid var(--card-border); color: var(--text-sub); padding: 8px 18px; border-radius: 6px; cursor: pointer; }
    .filter-btn.active { color: #10b981; border-color: var(--primary); }
    .analysts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }
    .analyst-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 25px; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
    .analyst-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
    .profile-info h3 { font-size: 1.3rem; color: #ffffff; }
    .firm-tag { color: #10b981; background: rgba(4, 120, 87, 0.12); padding: 2px 6px; border-radius: 4px; margin-right: 6px; }
    .award-text { background: rgba(4, 120, 87, 0.04); color: #10b981; padding: 8px 12px; border-radius: 6px; margin: 15px 0; font-weight: 600; }
    .evaluation-text { color: var(--text-sub); font-size: 0.9rem; margin-bottom: 20px; }
    .tag { background: #101620; border: 1px solid #1f2937; padding: 4px 8px; font-size: 0.78rem; border-radius: 4px; margin: 2px; }

    /* 테이블 */
    .alerts-container, .reports-container { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 30px; }
    .alerts-table { width: 100%; border-collapse: collapse; }
    .alerts-table th { color: #10b981; padding: 10px; border-bottom: 2px solid var(--card-border); background: #101620; text-align: left; }
    .alerts-table td { padding: 10px; border-bottom: 1px solid var(--card-border); font-size: 0.82rem; }
    .badge-alert { padding: 4px 8px; border-radius: 4px; font-weight: 700; font-size: 0.75rem; }
    .badge-alert.upgrade { border: 1px solid var(--upgrade); color: var(--upgrade); }
    .badge-alert.downgrade { border: 1px solid var(--downgrade); color: var(--downgrade); }

    /* 리포트 카드 */
    .reports-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }
    .report-card { background: #040608; border: 1px solid var(--card-border); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
    .report-title { font-size: 1.05rem; color: #ffffff; margin-bottom: 10px; }
    .report-footer { background: #080c12; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 0.85rem; }

    /* 차트 */
    .chart-tab-container { display: grid; grid-template-columns: 1fr 300px; gap: 25px; }
    .chart-left-panel { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 25px; }
    .chart-wrapper { height: 400px; }
    .chart-right-panel { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 20px; max-height: 560px; overflow-y: auto; }
  </style>
</head>
<body>

  <div class="container">
    <div class="tabs-nav">
      <button class="tab-btn active" onclick="switchTab('tab-analysts')"><i class="fa-solid fa-folder-open"></i> 결합 섹터</button>
      <button class="tab-btn" onclick="switchTab('tab-alerts')"><i class="fa-solid fa-triangle-exclamation"></i> 의견 변동</button>
      <button class="tab-btn" onclick="switchTab('tab-reports')"><i class="fa-solid fa-file-invoice-dollar"></i> 리서치 보고서</button>
      <button class="tab-btn" onclick="switchTab('tab-chart')"><i class="fa-solid fa-chart-line"></i> 분석 차트</button>
      <button class="tab-btn" onclick="switchTab('tab-calendar')"><i class="fa-regular fa-calendar-check"></i> 경제 캘린더</button>
    </div>

    <div id="tab-analysts" class="tab-content active">
      <div class="filter-container" id="filter-buttons"></div>
      <div class="analysts-grid" id="analysts-container"></div>
    </div>

    <div id="tab-alerts" class="tab-content">
      <div class="alerts-container">
        <h2 style="margin-bottom:20px; color:var(--primary);">📊 의견 변동 추적</h2>
        <table class="alerts-table">
          <thead><tr><th>기업</th><th>애널리스트</th><th>방향</th><th>흐름</th><th>목표가</th><th>코멘트</th><th>날짜</th></tr></thead>
          <tbody id="alerts-container-body"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-reports" class="tab-content">
      <div class="reports-container">
        <h2 style="margin-bottom:20px; color:var(--primary);">📄 종합 리서치 센터</h2>
        <div class="reports-grid" id="reports-container-grid"></div>
      </div>
    </div>

    <div id="tab-chart" class="tab-content">
      <div class="chart-tab-container">
        <div class="chart-left-panel">
          <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2 style="color:var(--primary);">📈 주가 분석</h2>
            <div style="display:flex; gap:8px;">
              <button id="btn-chart-mode-pct" class="filter-btn active" onclick="setChartMode('pct')">수익률</button>
              <button id="btn-chart-mode-price" class="filter-btn" onclick="setChartMode('price')">가격</button>
            </div>
          </div>
          <div class="chart-wrapper"><canvas id="marketChart"></canvas></div>
          <div id="external-events-list" style="margin-top:20px; max-height:150px; overflow-y:auto;"></div>
        </div>
        <div class="chart-right-panel">
          <input type="text" id="stock-search" oninput="filterStockChecklist()" placeholder="🔍 검색..." style="width:100%; padding:8px; margin-bottom:10px; background:#040608; border:1px solid #101620; color:white;">
          <div style="display:flex; gap:5px; margin-bottom:10px;">
            <button class="filter-btn" onclick="toggleAllStocks(true)" style="flex:1; font-size:0.7rem;">전체</button>
            <button class="filter-btn" onclick="toggleAllStocks(false)" style="flex:1; font-size:0.7rem;">해제</button>
          </div>
          <div id="stock-checklist"></div>
        </div>
      </div>
    </div>

    <div id="tab-calendar" class="tab-content">
      <div class="reports-container" style="max-width:900px; margin:0 auto;">
        <h2 style="margin-bottom:20px; color:var(--primary);">🗓 경제 캘린더</h2>
        <div id="calendar-container-body"></div>
      </div>
    </div>
  </div>

  <script src="analyst_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
