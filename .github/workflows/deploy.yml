name: Daily Build and Deploy

on:
  schedule:
    # 매일 밤 9시 (KST) -> UTC 12:00
    - cron: '0 12 * * *'
  workflow_dispatch: # 수동 실행 가능하도록 설정

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 필요한 라이브러리가 있다면 여기에 추가 (예: pandas, requests 등)
          # 현재 updater.py는 표준 라이브러리 위주로 사용 중인 것으로 보임

      - name: Run Update Script
        run: |
          python updater.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: nightly data update $(date +'%Y-%m-%d')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 배포할 폴더 (index.html이 있는 루트)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
